name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本标签 (如 v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: source
        run: npm install

      - name: Build .mcaddon
        working-directory: source
        run: npm run build

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Rename and prepare asset
        shell: bash
        run: |
          mv VeinMiner-v0.1.0-alpha.mcaddon "VeinMiner-${{ steps.version.outputs.tag }}.mcaddon"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            VeinMiner ${{ steps.version.outputs.tag }}
            
            - 纯行为包（.mcaddon），零资源包依赖
            - @minecraft/server-ui 表单界面
            - BFS 连矿算法 + 动态属性持久化
            - 中/英/繁中三语支持
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') }}
          files: VeinMiner-${{ steps.version.outputs.tag }}.mcaddon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
